<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>강동자바라 스텐 방범창 평수견적 계산기</title>
<link rel="stylesheet" href="style.css?v=5">
</head>
<body>
<main class="kd-wrap">
  <section class="kd-banner">
    <img src="images/banner.png" alt="스텐 방범창 평수견적 계산기">
  </section>

  <section class="kd-calculator" id="calculator">
    <div class="left-panel">
      <div class="field-section">
        <h3>1. 재질 선택</h3>
        <div id="materialOptions" class="radio-list"></div>
      </div>

      <div class="input-row">
        <div class="field-section">
          <h3>2. 가로 (mm)</h3>
          <input id="widthInput" type="number" placeholder="예) 1550">
        </div>
        <div class="field-section">
          <h3>3. 세로 (mm)</h3>
          <input id="heightInput" type="number" placeholder="예) 1650">
        </div>
      </div>

      <div class="field-section">
        <h3>4. 창문 개수</h3>
        <div class="qty-box">
          <button type="button" id="minusBtn">−</button>
          <input id="qtyInput" type="number" value="1" min="1">
          <button type="button" id="plusBtn">＋</button>
        </div>
      </div>

      <button type="button" id="addWindow" class="add-btn">＋ 창문 추가하기</button>
    </div>

    <div class="right-panel">
      <div class="result-box">
        <h3>계산 결과</h3>
        <div class="result-row"><span>평수 (반올림)</span><b id="currentPyeong">0 평</b></div>
        <div class="result-row"><span>예상금액</span><b id="currentAmount">0 원</b></div>
      </div>

      <h3 class="list-title">창문 목록</h3>
      <div class="table-wrap">
        <table id="windowTable">
          <thead>
            <tr><th>No.</th><th>가로(mm)</th><th>세로(mm)</th><th>평수</th><th>금액</th><th>삭제</th></tr>
          </thead>
          <tbody></tbody>
        </table>
        <div id="emptyText" class="empty-text">창문을 추가해주세요.</div>
      </div>

      <div class="sum-box">
        <div class="result-row"><span>총 평수</span><b id="totalPyeong">0 평</b></div>
        <div class="result-row"><span>총 예상금액</span><b id="totalAmount">0 원</b></div>
      </div>
    </div>

    <div class="button-row">
      <button type="button" id="copyBtn" class="copy">견적내용 복사</button>
      <a href="https://talk.naver.com/ct/w4a85f?frm=psf" target="_blank" class="talk">네이버 톡톡 문의</a>
      <a href="tel:01075950484" class="phone">전화 문의</a>
      <a href="https://kdjavara.kr/product/%ED%85%8C%EC%8A%A4%ED%8A%B8-sus-%EC%85%80%ED%94%84-%EC%8B%9C%EA%B3%B5-304%EC%8A%A4%ED%85%8C%EC%9D%B8%EB%A6%AC%EC%8A%A4-%EB%B0%A9%EB%B2%94%EC%B0%BD-%EC%99%84%EC%A1%B0%EB%A6%BD%EC%A0%9C%ED%92%88-%EC%8A%A4%ED%85%90-%EC%B0%BD%EB%AC%B8-%EC%85%80%ED%94%84-%EC%84%A4%EC%B9%98-%EB%A7%9E%EC%B6%A4-%EC%A0%9C%EC%9E%91/775/category/52/display/1/" target="_blank" id="orderBtn" class="order">계산한 사양으로 주문하기</a>
    </div>

    <div class="notice-box">
      <p>· 여러 창문의 견적을 한 번에 계산할 수 있습니다.</p>
      <p>· 계산된 내용은 ‘견적내용 복사’ 버튼을 눌러 주문 시 붙여넣기 하세요.</p>
    </div>
  </section>
</main>
<script src="prices.js?v=5"></script>
<script src="script.js?v=5"></script>
</body>
</html>
